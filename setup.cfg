[flake8]
max-line-length = 110
exclude =
    venv,
    .venv,
    __pycache__,
    data
ignore =
    E203,
    W503
per-file-ignores =
    gui/dialogs.py: E501

[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
check_untyped_defs = True
ignore_missing_imports = True

[mypy-gui.*]
disable_error_code = attr-defined, call-overload, assignment
