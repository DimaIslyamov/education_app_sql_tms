name: lint_and_typecheck

on: [push, pull_request]

jobs:
  lint_typecheck:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: make install-dev

    - name: Run lint
      run: make lint

    - name: Run typecheck
      run: make typecheck


